  .cta-primary:active {

  .cta-primary svg {

  .link:active { transform: translateY(1px); }
  .link:hover { border-color: #C7D2E2; }

  .link .icon {

    height: 36px;

    color: var(--primary);
    display: inline-flex;

    justify-content: center;
    flex-shrink: 0;

  .link .icon svg {
