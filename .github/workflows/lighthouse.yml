name: Lighthouse CI

# Audita site-principal sempre que a Vercel termina um deploy Ready desse
# projeto específico. Usa o evento deployment_status do GitHub em vez de
# pull_request + polling — duas abordagens anteriores (#91, #92) falharam:
#
# #91: wait-for-vercel-preview pegou o primeiro deployment_status que
#      chegou, sem distinguir entre os 4 projetos Vercel do monorepo.
#
# #92: poll do comentário do vercel[bot] falhou porque o bot não atualiza
#      o comentário confiavelmente (confirmado via Vercel API: deploy
#      ficou Ready em 50s, comentário ficou "Building" por 10+ min).
#
# Esta versão usa o evento deployment_status — a fonte canônica e
# determinística para "deploy X está Ready". Filtra pelo nome do projeto
# via github.event.deployment.environment.
#
# IMPORTANTE: workflows disparados por deployment_status só rodam a partir
# da default branch (main). Este workflow só funciona APÓS o merge em
# main — o PR que adiciona/altera este arquivo NÃO se auto-testa.

on:
  deployment_status:

concurrency:
  group: lighthouse-${{ github.event.deployment.sha }}-site-principal
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Auditar preview com Lighthouse
    # Só roda quando a Vercel marca site-principal como success.
    # Ignora painel-cfo/crm/cto e ignora states building/error/failure.
    if: |
      github.event.deployment_status.state == 'success' &&
      contains(github.event.deployment.environment, 'site-principal')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Descobrir PR associado ao commit
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.deployment.sha;
            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: sha,
            });
            const pr = prs.find(p => p.state === 'open');
            if (!pr) {
              core.info(`Sem PR aberto para ${sha} — pulando (push direto em main ou PR já mergeado).`);
              core.setOutput('number', '');
              return;
            }
            core.info(`PR associado: #${pr.number}`);
            core.setOutput('number', String(pr.number));

      - name: Rodar Lighthouse
        if: steps.pr.outputs.number != ''
        id: lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: ${{ github.event.deployment_status.environment_url }}
          uploadArtifacts: true
          temporaryPublicStorage: true
          runs: 1

      - name: Comentar scores no PR
        if: steps.pr.outputs.number != '' && steps.lighthouse.outcome == 'success'
        uses: actions/github-script@v7
        env:
          MANIFEST: ${{ steps.lighthouse.outputs.manifest }}
          LINKS: ${{ steps.lighthouse.outputs.links }}
          PREVIEW_URL: ${{ github.event.deployment_status.environment_url }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        with:
          script: |
            const manifest = JSON.parse(process.env.MANIFEST);
            const links = JSON.parse(process.env.LINKS);
            const previewUrl = process.env.PREVIEW_URL;
            const prNumber = Number(process.env.PR_NUMBER);

            const run = manifest.find(r => r.isRepresentativeRun) || manifest[0];
            const s = run.summary;
            const score = (v) => Math.round(v * 100);
            const emoji = (v) => v >= 0.9 ? '🟢' : v >= 0.5 ? '🟠' : '🔴';
            const reportUrl = links[run.url];

            const marker = '<!-- lighthouse-ci-comment -->';
            const body = [
              marker,
              '## 🚦 Lighthouse — Preview Vercel (site-principal)',
              '',
              `**URL auditada:** ${previewUrl}`,
              '',
              '| Categoria | Score |',
              '|-----------|------:|',
              `| Performance    | ${emoji(s.performance)} **${score(s.performance)}** |`,
              `| Accessibility  | ${emoji(s.accessibility)} **${score(s.accessibility)}** |`,
              `| Best Practices | ${emoji(s['best-practices'])} **${score(s['best-practices'])}** |`,
              `| SEO            | ${emoji(s.seo)} **${score(s.seo)}** |`,
              '',
              `📄 [Relatório completo](${reportUrl})`,
              '',
              '<sub>Automatizado · `.github/workflows/lighthouse.yml` · Metas: Accessibility ≥ 90, SEO ≥ 95</sub>',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const existing = comments.find(c => (c.body || '').includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
